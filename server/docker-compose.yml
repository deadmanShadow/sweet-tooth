services:
  db:
    image: postgres:16-alpine
    container_name: sweet_tooth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sweet_tooth
    ports:
      - "5432:5432"
    volumes:
      - sweet_tooth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sweet_tooth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sweet_tooth_pgdata:

